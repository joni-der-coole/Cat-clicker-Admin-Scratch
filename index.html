<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <title>Mein Scratch Projekt | Online Spielen</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .game-container {
            border: 5px solid #4d4d4d;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 {
            margin-bottom: 20px;
        }
        p {
            margin-top: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h1>Mein Scratch Spiel</h1>

    <div class="game-container">
        <iframe src="https://scratch.mit.edu/projects/1246123020/embed" 
                allowtransparency="true" 
                width="485" 
                height="402" 
                frameborder="0" 
                scrolling="no" 
                allowfullscreen>
        </iframe>
    </div>

    <p>Klicke auf die grüne Flagge, um zu starten!</p>

</body>
</html>
